# Dark Heart Labs — darkheartlabs.technology
title: "JV · Dark Heart Labs"
tagline: "code // creativity // the technical void"
description: "Essays on code and creativity. Dark Heart Labs — technical signal, reviews, and craft."
url: "https://darkheartlabs.technology"
baseurl: ""
email: jv@darkheartlabs.technology
author: JV · Dark Heart Labs

asset_version: "20260713f"

markdown: kramdown
highlighter: rouge
permalink: pretty
future: false

collections:
  essays:
    output: true
    permalink: /p/:name/
  journal:
    output: true
    permalink: /media/written/journal/travel/:name/
  wellness:
    output: true
    permalink: /media/written/journal/wellness/:name/
  podcast:
    output: true
    permalink: /media/podcast/:name/
  readings:
    output: true
    permalink: /r/:name/
  films:
    output: true
    permalink: /f/:name/
  verse:
    output: true
    permalink: /v/:name/
  gallery:
    output: true
    permalink: /media/gallery/:name/

defaults:
  - scope:
      path: ""
      type: essays
    values:
      layout: essay
  - scope:
      path: ""
      type: journal
    values:
      layout: essay
      shelf: travel
      signal_code: JOURNAL
      shelf_archive: /media/written/journal/travel/
      shelf_label: travel journal
      trace_label: journal
  - scope:
      path: ""
      type: wellness
    values:
      layout: essay
      shelf: wellness
      signal_code: WELLNESS
      shelf_archive: /media/written/journal/wellness/
      shelf_label: wellness
      trace_label: wellness
  - scope:
      path: ""
      type: podcast
    values:
      layout: podcast
  - scope:
      path: ""
      type: readings
    values:
      layout: reading
  - scope:
      path: ""
      type: films
    values:
      layout: film
  - scope:
      path: ""
      type: verse
    values:
      layout: verse
  - scope:
      path: ""
      type: gallery
    values:
      layout: gallery-set
  - scope:
      path: ""
    values:
      layout: page

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-redirect-from

feed:
  posts_limit: 50
  excerpt_only: false
  collections:
    essays:
      path: "/feed.xml"
    posts:
      path: "/posts-feed.xml"

sass:
  sass_dir: _sass
  style: compressed

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .dockerignore
  - vendor
  - node_modules
  - scripts
  - .github

kramdown:
  input: GFM
  hard_wrap: false

theme_color: "#0a0014"
google_site_verification: "W5i_THdAkiwDrJEZlN4D4piB4XLHsMoFuCwz1Xll5hU"
