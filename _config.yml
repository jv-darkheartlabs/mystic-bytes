# Site settings
title: "Jennifer Picado - Full-Stack Developer"
description: "Full-stack developer with 20+ years of experience. Specializing in React, Node.js, TypeScript, and AI integration. Open to remote work."

# Build settings
markdown: kramdown
sass:
  sass_dir: _sass
  style: compressed

# Resume settings
resume_avatar: "true"
resume_name: "Jennifer Picado"
resume_title: "Full-Stack Developer"

# used for the contact button in _layouts/resume.html
resume_contact_email: "dev@arcaneglam.com"

# the next two items are used for schema itemprops in _layouts/resume.html
resume_contact_telephone: "504.510.1878"
resume_contact_address: "Chalmette, LA"

resume_header_contact_info: "3409 Jackson Blvd Chalmette LA 70043 • 504.510.1878 • dev@arcaneglam.com"
display_header_contact_info: "false"

resume_header_intro: "<p>Full-stack developer with 20+ years of web development experience and a focus on React, Node.js, and TypeScript. Builds performant, accessible applications from database to UI. Active open source contributor with hands-on AI integration skills.</p>"

# use "yes" to display the email contact button,
# "no" to display an "I'm not looking for work" message,
# or remove the resume_looking_for_work option entirely
# to leave blank
resume_looking_for_work: "yes"

# Decide which sections to use
# comment out to hide
resume_section_experience: true
#resume_section_education: true
resume_section_projects: true
resume_section_skills: true
resume_section_recognition: true
resume_section_links: true
resume_section_associations: true
resume_section_interests: true

# Resume social links
# uncomment the options you wish to display, and add your own URL
resume_social_links:
  resume_github_url: "https://github.com/arcaneglam"
  resume_behance_url: "https://www.behance.net/arcaneglam"
  resume_linkedin_url: "https://linkedin.com/in/arcaneglam"
  resume_website_url: "https://dev.arcaneglam.com"

resume_print_social_links: true

# Design settings
resume_theme: default
