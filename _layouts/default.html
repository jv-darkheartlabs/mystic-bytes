<!DOCTYPE html>
<html lang="en">
  {% include head.html %}
  <body>
    <a class="skip-link" href="#main-content">Skip to main content</a>
    {% include atmosphere.html %}
    <div class="site-shell">
      {% include header.html %}
      <main id="main-content" class="site-main">
        {{ content }}
      </main>
      {% include footer.html %}
    </div>
    <script src="{{ '/assets/js/nav.js' | relative_url }}" defer></script>
    <script src="{{ '/pagefind/pagefind-ui.js' | relative_url }}" defer></script>
    <script src="{{ '/assets/js/search.js' | relative_url }}" defer></script>
    {% if page.ticker or layout.ticker %}
    <script src="{{ '/assets/js/ticker.js' | relative_url }}" defer></script>
    {% endif %}
    {{ page_scripts }}
  </body>
</html>
