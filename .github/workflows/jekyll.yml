name: Deploy Jekyll site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.11"
          bundler-cache: true

      - name: Build Jekyll
        run: bundle exec jekyll build --trace --future

      - name: Add Pagefind search index
        run: npx --yes pagefind@1.3.0 --site _site

      - name: Check internal links
        env:
          LANG: C.UTF-8
          LC_ALL: C.UTF-8
        run: >
          bundle exec htmlproofer _site
          --assume-extension
          --allow-hash-href
          --ignore-urls "/pagefind/,/instagram.com/,/twitch.tv/,/youtube.com/,/discord.gg/"
          --ignore-status-codes 301,404,403,429,999,0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Retry GitHub Pages deploy
        if: steps.deployment.outcome == 'failure'
        id: deployment_retry
        uses: actions/deploy-pages@v4

      - name: Verify deploy succeeded
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        run: exit 1
