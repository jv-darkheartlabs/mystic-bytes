<span class="section-label">
  {% if include.badge %}
  <span class="section-label__badge">[{{ include.badge }}]</span>
  {% endif %}
  <span class="section-label__num">[{{ include.num }}]</span>
  <span class="section-label__title">{{ include.title }}</span>
  <span class="section-label__line"></span>
  <span class="section-label__dot" aria-hidden="true"></span>
</span>
