tagline: "contract work · fixed packages · no equity-only"
lede: "Apple-platform software, accessibility, AI integration, Jekyll sites on GitHub Pages, and Louisiana Gulf Fix & Fish days for yacht owners who want tech support without skipping the charter. Rates are modelled on an Auckland AEWV senior IC package plus a settling stipend — so retainers read like sponsorship-shaped monthly capacity. Remote, hybrid, and on-site work included at these rates."

rate_basis: "Benchmark: Auckland AEWV market for senior Developer Programmer (~NZD $150,000 / year) plus NZD $2,000 / month housing–settling stipend ≈ NZD $14,500 / month fully shaped. The 80-hour retainer is the half-time version with a light contract premium; the full-time line doubles that capacity. AUD/USD invoices use mid-market FX. Fix & Fish is Louisiana field work — dockside diagnostic first; you name what the service was worth (parts are always yours to buy). Sites packages are fixed build or publishing retainers on top of the same hourly floor."

specs:
  - label: hourly_rate
    value: "NZD $205 · USD $120 · 4–8 hour minimum"
  - label: rate_basis
    value: "Auckland AEWV senior IC + NZD $2k/mo stipend"
  - label: payment
    value: "PayPal · Wise · AUD/NZD/USD at mid-market rate"
  - label: engagement
    value: "Remote · hybrid · on-site · Louisiana field"
  - label: employment
    value: "Full-time / sponsored roles → see CV"
  - label: availability
    value: "Open for new clients · ~1 Fix & Fish / week"

rules:
  - "Nothing unpaid — spec work and ‘exposure’ are declined."
  - "Rush timelines billed at 2× for inconvenience."
  - "No equity-only engagements."
  - "No CMS builds, finance products, medical software, ecommerce, or member login."
  - "Human approval on what ships — AI assists; you lead."
  - "Fix & Fish: dockside diagnostic first; client vessel or client-hired charter; parts never included (you buy); service fee is what the day was worth to you — no stamped menu price."
  - "Sites: structure, theme, and deploy only — you write the content; repo set up then transferred; domain stays client-owned."

realms:
  - id: fix_and_fish
    title: fix & fish
    badge: FIELD
    section_num: "00"
    summary: "Louisiana Gulf · your yacht or a charter you hire · I fix what plugs in while your guests fish · up to 3–4 computers with advance notice · ~1 booking / week"
    pitch:
      title: "charted water, dead screen"
      lines:
        - "Dawn at the slip. The partner's laptop will not wake. The charter is paid for, the tide is moving, and the redfish do not care about your inbox. You are not choosing between love and the line — you are choosing whether shame sits on the gunwale while everyone else casts."
        - "I got you, captain. Fix & Fish puts IT on your vessel or the boat you hire: dockside diagnostic first, then a half- or full-day while your people fish. I work what plugs in — MacBooks, Wi‑Fi, the small disasters — until the software yields or we write the parts list you take to the chandlery yourself."
        - "Parts are never on my tab. What you pay for the service is what that peace was worth to you — can anyone really stamp a global price on convenience? Your charter, slip, fuel, and hardware are yours. I bring the hands; you decide what a guilt-free day on the Gulf costs."
    booking:
      label: "Request Fix & Fish →"
      href: "/contact/?intent=fix-and-fish"
      note: "Include marina, vessel type, device count, and half- or full-day preference."
    proof: []
    packages:
      - name: Dockside Diagnostic
        price: "you name what it's worth"
        timeline: "1–2 hours · required before any Fix & Fish day"
        includes:
          - "On-vessel or marina meetup — triage devices, network, and whatever plugs in"
          - "Written go / no-go: software-fixable today vs parts required"
          - "Parts list for anything you need to buy (never included in service; I do not stock hardware)"
        excludes:
          - "Fishing time · motherboard soldering · screen replacement · board-level repair"
          - "Charter day itself (book after diagnostic clears or after parts arrive)"
          - "Any hardware cost — parts are always client-purchased"
      - name: Half-Day Fix & Fish
        price: "you name what the half-day is worth"
        timeline: "~4 hours tech capacity · parallel with your charter"
        includes:
          - "Up to 3–4 computers / devices with advance notice — MacBook software repairs and connected gear"
          - "You and guests fish; I work until problems are solved, then I may join the line"
          - "Your yacht or a vessel you charter — I am IT crew, not the captain"
          - "Optional galley prep if you supply the food — catered, dock restaurant, or coolers are fine"
          - "Alcohol at your discretion (BYO / your tab)"
        excludes:
          - "Parts (never included) · food cost · travel beyond the local Gulf day"
          - "Motherboard soldering · screen replacements · more than 4 machines without a custom brief"
          - "Charter hire, fuel, slip, or captain fees (your arrangement)"
      - name: Full-Day Fix & Fish
        price: "you name what the full-day is worth"
        timeline: "~6–8 hours tech capacity · parallel with your charter"
        includes:
          - "Same scope as Half-Day with a full charter window — up to 3–4 computers with advance notice"
          - "Weather / parts pause: if hardware is required, the charter day waits until parts arrive — no soldering, no screen swaps"
          - "Out-of-area yachts: travel and lodging at cost; service fee still at your discretion"
        excludes:
          - "Parts (never included) · food cost · charter vessel hire"
          - "Motherboard soldering · screen replacements · open-ended office IT retainers (see technology)"

  - id: sites
    title: sites
    badge: SITE
    section_num: "01"
    summary: "Static Jekyll on GitHub Pages · custom domain · embeds when you want them · built from your brief or Figma · I set up the repo then transfer it · you write the words"
    pitch:
      title: "advanced dns and the business owner"
      lines:
        - "You did not start a company to learn what an apex record is at 11 p.m. The site is ready — or the developer is waiting — and GoDaddy opens Advanced DNS like a storm door: CNAME, TXT, SRV, nameservers from 2014 still whispering from the attic."
        - "That shaking in your chest is not incompetence. It is a sane response to an interface that treats your livelihood like a lab experiment. GitHub Pages wants four truths. Your old email forwarder wants an SPF. Someone on YouTube says click here; the panel says something else. You are the owner. You should not have to become a network priest to publish."
        - "I map the records, verify propagation, and leave you a short written ledger of what changed. You keep the domain and the keys. I never ask for your password — on GoDaddy you invite me with Domains Only access (steps below). Other registrar? Name it in your brief; the goal is the same: DNS handled without trauma."
    access:
      title: "GoDaddy · Domains Only delegate access"
      disclaimer: "Dark Heart Labs is not affiliated with GoDaddy. UI labels change; if yours looks different, use their help article linked below."
      steps:
        - "Sign in at godaddy.com with the account that owns the domain."
        - "Open your profile (avatar) → Account Settings → Delegate Access — or go to the Delegate Access page while signed in."
        - "Under People who can access my account, select Invite to Access."
        - "Name: Jennifer · Email: jv@darkheartlabs.technology"
        - "Access level: Domains Only — not Products, not purchases, not your billing or payment methods."
        - "Select Invite. GoDaddy emails me; I accept from the studio side. Pending invites expire in about 48–72 hours if not accepted; you can cancel anytime."
        - "Optional: after I accept, you can restrict which domains I see via Domain Portfolio → folder permissions if you manage many names."
      other_registrars: "Cloudflare, Namecheap, Squarespace Domains, and others: same outcome, different clicks — tell me which registrar in your site brief and I will send the matching checklist. No password sharing on any of them."
      help:
        label: "GoDaddy · invite a delegate"
        href: "https://www.godaddy.com/help/invite-a-delegate-to-access-my-godaddy-account-12376"
    booking:
      label: "Request a site →"
      href: "/contact/?intent=sites"
      note: "Say which package, whether you are migrating, and if the domain is already yours. DNS-only: Advanced DNS Setup ($250 USD). GoDaddy: send Domains Only delegate invite before we start."
    proof:
      - label: darkheartlabs.technology
        href: "https://darkheartlabs.technology/"
    packages:
      - name: Advanced DNS Setup
        price: "$250 USD"
        timeline: "Typically 1–3 business days after delegate access is accepted"
        includes:
          - "DNS for GitHub Pages or your stated host — A, AAAA, CNAME, TXT as required"
          - "Written before/after summary and propagation verification notes"
          - "GoDaddy: you invite Jennifer (jv@darkheartlabs.technology) with Domains Only — see steps above"
          - "Other registrars: checklist after you name them in your brief"
        excludes:
          - "Full Jekyll site build (see packages below) · buying or transferring the domain"
          - "Email mailbox migration · sharing your login · Products-level GoDaddy access"
      - name: Jekyll Starter
        price: "$2,800 USD"
        timeline: "Typically 2–3 weeks · one-shot build + handoff"
        includes:
          - "Jekyll 4 site · GitHub Pages · up to 6 pages from your brief or Figma"
          - "Custom domain wiring checklist · mailto contact form"
          - "Repo created under studio, then transferred to your GitHub"
          - "One revision round on structure and theme · you supply all copy"
          - "Options: Advanced DNS Setup standalone above · or DNS bundled with build +$250 · CI pipeline +$600 · migration from WordPress or similar from +$1,800"
        excludes:
          - "Content writing · Decap/CMS · ecommerce · member login"
          - "Ongoing publishing (see Publishing Care)"
      - name: Studio Site
        price: "$5,400 USD"
        timeline: "Typically 3–5 weeks · this-site class build + handoff"
        includes:
          - "Collections, SCSS theme system, embeds (Spotify, video, etc. as you choose)"
          - "Custom domain · mailto · README handoff · repo setup then transfer"
          - "Built from brief or Figma · one revision round · you write the content"
          - "Same options as Starter: Advanced DNS Setup standalone · or DNS bundled +$250 · CI (build → Pagefind → link check) +$600 · migration from +$1,800"
        excludes:
          - "Content writing · CMS · ecommerce · member login"
      - name: Content Hub
        price: "$8,400 USD"
        timeline: "Typically 5–8 weeks · larger archive + handoff"
        includes:
          - "Essay / media / multi-shelf information architecture · redirects · search-ready layout"
          - "Everything in Studio Site at larger scope · embeds where useful"
          - "Repo setup then transfer · client-owned domain · you supply copy and assets"
          - "Options: Advanced DNS Setup standalone · or DNS bundled +$250 · CI +$600 · WordPress or other migration from +$1,800 (scoped after inventory)"
        excludes:
          - "Content writing · CMS · ecommerce · member login"
      - name: Publishing Care
        price: "$900 USD / month"
        timeline: "Retainer · ~6 hours / month · cancel anytime with 30 days notice"
        includes:
          - "Publish posts you write · small page updates · dependency bumps · deploy help"
          - "Available after any sites package handoff — or for an existing Jekyll/GitHub Pages site after a short audit"
        excludes:
          - "New feature builds (use Studio Site scope or technology Build Sprint)"
          - "CI setup (one-time +$600 add-on if not already in place)"

  - id: technology
    title: technology
    badge: TECH
    section_num: "02"
    summary: "iOS/macOS · AI integration · accessibility · Rails/web · devops · technical documentation"
    proof:
      - label: NeuroShell
        href: "https://github.com/jv-darkheartlabs/NeuroShell"
      - label: accessibility-rails-components
        href: "https://github.com/jv-darkheartlabs/accessibility-rails-components"
    packages:
      - name: Accessibility Audit
        price: "$1,800 USD"
        timeline: "Typically 5–10 business days"
        includes:
          - "WCAG 2.1 AA review of one app surface or web property"
          - "Written findings report with severity and fix order"
          - "Top-priority remediation notes — not a checkbox PDF"
        excludes:
          - "Full implementation (available as sprint or retainer)"
      - name: Build Sprint
        price: "$5,400 USD"
        timeline: "40 focused hours · ~1 week calendar"
        includes:
          - "One scoped slice — feature, integration, or doc pass"
          - "README-scale web work, AI/MCP wiring, or a11y fixes"
          - "Handoff notes and one revision round on deliverables"
        excludes:
          - "Open-ended backlog without a written scope"
      - name: Engineering Retainer
        price: "NZD $16,400 · USD $9,600 / month"
        timeline: "80 hours · monthly cadence · AEWV-shaped"
        includes:
          - "Sustained IC work across your stack"
          - "Code review, docs, CI/devops, and accessibility hardening"
          - "Priced as Auckland AEWV senior package + stipend, half-time delivery"
          - "Remote, hybrid, or on-site · async standups — no meeting theatre"
        excludes:
          - "CMS · finance · medical · ecommerce · member login"

open_source:
