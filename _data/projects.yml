featured:
  -
    name: NeuroShell
    role: "Creator & Lead Developer"
    period: 2024 — Present
    href: "https://github.com/jv-darkheartlabs/NeuroShell"
    cover: /assets/images/project-neuroshell.svg
    headline: "AI productivity for loud minds"
    outcome: "Shipped v2 on macOS; v3 in active development. Human-Focused AI Award, Tetrate Buildathon."
    body: "Open-source terminal and AI productivity suite built for developers with ADHD and cognitive differences. Plain-English command input, session recovery, focus timers, sensory tooling, and a full accessibility settings layer — AI that works for humans, not the other way around."
    quote:
      text: NeuroShell puts AI to work while centering real human value.
      attribution: "Birger Moëll, Associate Professor in Computational Linguistics, Uppsala University"
    tags:
      - macOS
      - Swift
      - AI
      - Accessibility
      - Award winner
  -
    name: focus-guard
    role: "Creator & Lead Developer"
    period: 2026 — Present
    href: "https://github.com/jv-darkheartlabs/focus-guard"
    cover: /assets/images/project-focus-guard.svg
    headline: "Focus policies at the proxy layer"
    outcome: "Blocks distractions upstream of the browser — environmental guardrails, not willpower."
    body: "Envoy dynamic module written in Rust. Teams define when and how deep-work sessions are protected at the edge, before distractions reach APIs, services, or the browser."
    tags:
      - Envoy
      - Rust
      - Focus tooling
      - Proxy
      - Open source
  -
    name: accessibility-rails-components
    role: "Creator & Maintainer"
    period: 2025 — Present
    href: "https://github.com/jv-darkheartlabs/accessibility-rails-components"
    cover: /assets/images/cover-craft.svg
    headline: "Accessible Rails components by default"
    outcome: "WCAG 2.1 AA patterns wired into ViewComponents and Stimulus — built from real audit findings."
    body: "Inclusive defaults, keyboard-first interaction, and assistive-tech-ready markup. Drop-in components for Rails apps that treat accessibility as a baseline, not a checklist."
    tags:
      - Rails
      - Ruby
      - Accessibility
      - ViewComponents
      - Open source
