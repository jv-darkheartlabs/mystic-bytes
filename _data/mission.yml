tenets:
  -
    n: I
    head: kindness, sharpened.
    body: "Interfaces should be steady, warm, and fast. We do not ship cruelty dressed up as cleverness — every control is a hand offered in the dark."
  -
    n: II
    head: build for neurodivergent minds first.
    body: "If it works for the tired brain at 2 a.m., it works in the boardroom at noon. Accessibility is not a feature flag; it is the keel."
  -
    n: III
    head: respect the pause.
    body: "Silence is part of the craft. The best work often finishes its sentence in the space between transmissions, not inside the noise."
  -
    n: IV
    head: open the source, close the leak.
    body: "What belongs to the commons goes back to the commons. What belongs to the patron stays sealed. Tooling is public; client work is not."
  -
    n: V
    head: use the machine — lead it.
    body: "Models are familiars, not oracles. Set the table, ask the better question, and sign the work as a human."
