# Book-club review framework — literary analysis shelf
# Target length: 400–550 words per review

voice: |
  Literary analysis — JV's critical reading voice. Literary, precise, sharp, gothic-romance fluent.
  Verdict-forward and a little dangerous. Never recap plot beat-by-beat. Analyze how and why the book works.
  Provoke discussion. Reference heat and desire implicitly through craft — never cite spice numbers (1–5).

verdict_format: "**Verdict:** one bold sharp sentence inline in Hook & thesis."

comparisons: "Compare freely to authors and landmark titles when it grounds genre placement."

launchpad_format: |
  Discussion launchpad uses two parts:
  1. Short prose on polarities and what remains unsaid (1–2 paragraphs)
  2. A markdown bullet list of 3–5 explicit book-club debate questions under **Questions for the room:**

sections:
  - id: hook
    label: "Hook & thesis"
    allocation: 15
    objective: "Introduce the book, the author's primary objective, and your definitive verdict."
    prompts:
      - "What is the book's true engine — the central human conflict beneath the trope?"
      - "What is your verdict in one sharp sentence?"

  - id: context
    label: "The contextual pivot"
    allocation: 20
    objective: "Ground the book in its genre; outline scope without plot summary."
    prompts:
      - "Where does this sit in the genre landscape and the author's body of work?"
      - "Who is the invisible audience — and does the book bridge niche tropes to general readers?"

  - id: critique
    label: "Deep-dive critique"
    allocation: 45
    objective: "Analyze craft, structure, thematic success, and mechanical flaws with specific evidence."
    prompts:
      - "How does structure (pacing, POV, timeline) serve or sabotage the thesis?"
      - "Where does craft excel or falter — prose, character, dialogue, world-building?"
      - "Is the ending earned?"

  - id: launchpad
    label: "Discussion launchpad"
    allocation: 20
    objective: "Present open questions and polarizing elements for group debate."
    prompts:
      - "What polarities will split a room for 45 minutes?"
      - "What remains unsaid — gaps, biases, unresolved questions?"

analytical_lenses:
  - "Core argument & thematic resonance"
  - "Execution, mechanics & craft"
  - "Contextualization & comparative value"
  - "Discussion catalyst"

markdown_format: |
  Use exactly these h2 headings in the review body (##):
  ## Hook & thesis
  ## The contextual pivot
  ## Deep-dive critique
  ## Discussion launchpad

  End with a single line of hashtags including #LiteraryAnalysis and #DarkHeartLabs.
