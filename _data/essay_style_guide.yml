# Technical essay style guide — Dark Heart Labs
# Corpus: 92 essays at /media/essays/ · rewrite pass v1

meta:
  version: 1
  collection: essays
  audience: broad tech — engineers, leads, PMs, designers, eng-adjacent readers
  sign_off: "— JV · Dark Heart Labs."
  frontmatter_tiers:
    - micro
    - pillar

voice: |
  Hybrid signal aesthetic outside, senior technical substance inside.
  Mixed POV: I for lived experience and case material; you for directives to the reader;
  they for industry patterns and org behavior.
  Balanced register: at most one strong metaphor per essay; otherwise concrete mechanism and evidence.
  Surgical tone: blunt about systems, incentives, and architecture — never punch down at individuals.
  Same template applies to code and craft topics (photography, newsletter form, etc.).

brief_block:
  keep: true
  fields:
    - system
    - issue
    - constraint
  rules: |
    Keep the [incoming brief] fiction. Make it technically plausible — real stacks, plausible
    incidents, constraints a team would actually face. The brief should foreshadow the essay's
    mechanism, not random CI-runner flavor text unless the essay is about CI.

case_studies:
  policy: named where safe
  allowed_named:
    - Nightbind
    - mystic-bytes / Dark Heart Labs site pipeline
    - dark-heart-themes
    - Public OSS and portfolio projects
    - Twitch / streaming stack (darkheartlabs)
  anonymize:
    - Employers and clients unless already public
    - Individual colleagues — roles ok ("a platform lead"), not names
  composite: label illustrative scenarios explicitly if used

citations:
  policy: footnotes
  expert_rule: |
    Each pillar essay includes footnotes citing the leading widely known expert on the topic —
    the person who named the idea, wrote the definitive book, created the tool, or authored the
    standard reference. Prefer primary sources (paper, spec, canonical talk, official docs).
    Micro essays: 0–1 footnote optional when a single citation anchors the claim.
  footnote_format: markdown reference-style [^1] with ## References block at end

closings:
  drop_transmission_chrome: true
  keep_sign_off: true
  body_close: directive sentence or checklist when useful — then sign-off on its own line

tiers:
  micro:
    frontmatter_type: micro
    definition: single sharp claim — one idea, no multi-step tradeoff space
    word_target: 150-250
    structure:
      - id: thesis
        label: Thesis
        objective: One sentence; no metaphor yet
      - id: mechanism
        label: Mechanism
        objective: How/why the claim holds — concrete, case-touched
      - id: close
        label: Close
        objective: Directive + sign-off
  pillar:
    frontmatter_type: pillar
    definition: systems with tradeoffs — failure modes, alternatives, second-order effects
    word_target: 700-1500
    structure:
      - id: thesis
        label: Thesis
        allocation: 10
      - id: context
        label: Context
        allocation: 15
        objective: Where this shows up — named project or anonymized org
      - id: mechanism
        label: Mechanism
        allocation: 35
        objective: How the system produces the outcome
      - id: tradeoffs
        label: Tradeoffs
        allocation: 25
        objective: Alternatives, costs, when the thesis fails
      - id: close
        label: Close
        allocation: 15
      - id: references
        label: References
        objective: Footnotes — leading expert on topic

rubric:
  scale: 1-5
  dimensions:
    - id: mechanism
      label: Mechanism clarity
      ask: Does the reader understand how the system fails or succeeds?
    - id: evidence
      label: Case + citation
      ask: Named safe example and footnoted authority present (pillar)?
    - id: voice
      label: Voice fit
      ask: Mixed POV, balanced register, surgical not cruel?
    - id: brief
      label: Brief coherence
      ask: Does the incoming brief match the essay body?
    - id: length
      label: Tier length
      ask: Micro 150–250 / pillar 700–1500?
  pass_threshold: 4

rewrite_workflow:
  - Classify tier (manifest below)
  - Set frontmatter type to micro or pillar
  - Rewrite brief if misaligned
  - Apply tier structure
  - Add references (pillar required)
  - Score with rubric before merge

