fidelity_levels:
  faithful:
    label: Faithful
    description: Close translation of plot, tone, and thematic intent
  loose:
    label: Loose
    description: Recognizable source with significant structural or tonal shifts
  reimagining:
    label: Reimagining
    description: Bold reinterpretation — new context, emphasis, or ending
  inspired-by:
    label: Inspired By
    description: Thematic or character DNA only; source is a distant ancestor

